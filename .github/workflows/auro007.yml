name: Auro007 Agent

on:
  schedule:
    - cron: '0 3 * * *'    # 9 AM India time (UTC+5:30 = 3:30 UTC)
    - cron: '30 12 * * *'  # 6 PM India time
  workflow_dispatch:        # manual trigger button

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 10 ]; then
            echo "mode=post" >> $GITHUB_OUTPUT
          else
            echo "mode=reply" >> $GITHUB_OUTPUT
          fi

      - name: Run Auro007 Agent
        run: python auro007.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MOLTBOOK_KEY: ${{ secrets.MOLTBOOK_KEY }}
          TOPIC: "Agentic AI cybersecurity and autonomous threat detection"
          RUN_MODE: post
