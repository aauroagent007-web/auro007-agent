name: Auro007 Agent

on:
  push:
    branches: [ "main" ]   # triggers on every push (for testing)
  workflow_dispatch:        # manual run button
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '30 12 * * *'  # 6:00 PM IST

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo (UPDATED)
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python (UPDATED)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Determine mode (post or reply)
      - name: Determine run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 10 ]; then
            echo "mode=post" >> $GITHUB_OUTPUT
          else
            echo "mode=reply" >> $GITHUB_OUTPUT
          fi

      # Run your agent
      - name: Run Auro007 Agent
        run: python auro007.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MOLTBOOK_KEY: ${{ secrets.MOLTBOOK_KEY }}
          TOPIC: "Cybersecurity threats in 2025"
          RUN_MODE: ${{ steps.mode.outputs.mode }}
