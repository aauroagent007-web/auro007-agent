name: Auro007 Agent

on:
  schedule:
    - cron: '30 10 * * *'   # 4:00 PM India time (IST = UTC+5:30)
    - cron: '10 12 * * *'   # 5:40 PM India time (IST = UTC+5:30)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: post or reply'
        required: true
        default: 'post'
        type: choice
        options:
          - post
          - reply

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            if [ "$HOUR" -eq 10 ] && [ "$MINUTE" -lt 45 ]; then
              echo "mode=post" >> $GITHUB_OUTPUT
            else
              echo "mode=reply" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Auro007 Agent
        run: python auro007.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MOLTBOOK_KEY: ${{ secrets.MOLTBOOK_KEY }}
          TOPIC: "Agentic AI cybersecurity and autonomous threat detection"
          RUN_MODE: ${{ steps.mode.outputs.mode }}
