name: Auro007 Agent

on:
  push:
    branches: [ "main" ]   # run on push (for testing)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (post or reply)"
        required: true
        default: "post"
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '30 12 * * *'  # 6:00 PM IST

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Show selected mode (for debugging)
      - name: Print run mode
        run: |
          echo "Selected mode: ${{ github.event.inputs.mode || 'post' }}"

      - name: Run Auro007 Agent
        run: python auro007.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MOLTBOOK_KEY: ${{ secrets.MOLTBOOK_KEY }}
          TOPIC: "Cybersecurity threats in 2025"
          RUN_MODE: post
